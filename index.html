<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orb Group</title>

<style>

/* ---------------- RESET ---------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* ---------------- HERO ---------------- */

.hero{
min-height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
radial-gradient(circle at 30% 20%,rgba(120,0,255,0.25),transparent 40%),
radial-gradient(circle at 70% 80%,rgba(255,200,0,0.15),transparent 40%),
#0b0b0b;
}

.hero h1{
font-size:60px;
max-width:900px;
line-height:1.05;
margin-bottom:20px;
}

.hero p{
font-size:20px;
opacity:0.75;
max-width:650px;
}

.cta-buttons{
margin-top:35px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:16px 30px;
border-radius:12px;
border:none;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:all .35s cubic-bezier(.2,.8,.2,1);
}

.primary{
background:linear-gradient(135deg,#ffd84a,#ffb400);
color:black;
}

.primary:hover{
transform:translateY(-4px);
box-shadow:0 20px 40px rgba(255,200,0,0.25);
}

.secondary{
background:transparent;
border:1px solid rgba(255,255,255,0.2);
color:white;
}

/* ---------------- STATS ---------------- */

.stats{
margin-top:60px;
display:flex;
gap:60px;
flex-wrap:wrap;
justify-content:center;
}

.stat strong{
font-size:28px;
color:#b388ff;
}

/* ---------------- SECTIONS ---------------- */

.section{
padding:120px 0;
}

.section-title{
font-size:36px;
text-align:center;
margin-bottom:60px;
}

/* ---------------- SERVICES ---------------- */

.services{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.service{
background:rgba(255,255,255,0.03);
padding:35px;
border-radius:16px;
transition:.35s;
}

.service:hover{
transform:translateY(-8px);
background:rgba(255,255,255,0.06);
}

/* ---------------- CALCULADORA ---------------- */

.calculator{

background:
linear-gradient(180deg,rgba(120,0,255,0.12),transparent),
#0b0b0b;

border-radius:20px;
padding:60px;
margin-top:60px;

box-shadow:0 40px 120px rgba(0,0,0,0.5);
}

.calc-grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:40px;

}

.calc-inputs{

display:flex;
flex-direction:column;
gap:25px;

}

.input-box{

background:rgba(255,255,255,0.03);
padding:20px;
border-radius:12px;

}

.input-box label{

font-size:14px;
opacity:.7;

}

.input-box input,
.input-box select{

margin-top:8px;
width:100%;
padding:14px;
border-radius:8px;
border:none;
background:#111;
color:white;
font-size:16px;

}

/* ---------------- RESULTS ---------------- */

.results{

display:none;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:40px;

}

.result-card{

background:rgba(255,255,255,0.03);
padding:25px;
border-radius:14px;

}

.result-card h4{

font-size:14px;
opacity:.6;

}

.result-number{

font-size:26px;
margin-top:6px;
color:#ffd84a;

}

.bar{

height:6px;
background:#222;
border-radius:4px;
margin-top:10px;
overflow:hidden;

}

.bar-fill{

height:100%;
width:0%;
background:linear-gradient(90deg,#7c3aed,#ffd84a);

transition:width 1.5s ease;

}

/* ---------------- CTA FINAL ---------------- */

.cta-final{

text-align:center;
margin-top:60px;

}

.cta-final button{

font-size:18px;
padding:20px 40px;

}

/* ---------------- RESPONSIVE ---------------- */

@media(max-width:900px){

.hero h1{
font-size:42px;
}

.calc-grid{
grid-template-columns:1fr;
}

.results{
grid-template-columns:1fr;
}

.services{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<!-- HERO -->

<section class="hero">

<h1>Escalamos empresas.<br>Multiplicamos faturamento.</h1>

<p>Estratégia, criativos e dados para aumentar ticket médio e previsibilidade de vendas.</p>

<div class="cta-buttons">
<button class="primary">Agendar diagnóstico</button>
<button class="secondary">Ver como funciona</button>
</div>

<div class="stats">

<div class="stat">
<strong>+50</strong>
<div>clientes</div>
</div>

<div class="stat">
<strong>+350%</strong>
<div>ROI médio</div>
</div>

<div class="stat">
<strong>R$12M+</strong>
<div>gerados</div>
</div>

</div>

</section>

<!-- SERVIÇOS -->

<section class="section container">

<h2 class="section-title">Nossas frentes</h2>

<div class="services">

<div class="service">Branding</div>
<div class="service">Design</div>
<div class="service">Tráfego pago</div>
<div class="service">Filmagem</div>
<div class="service">Consultoria</div>
<div class="service">Automação</div>

</div>

</section>

<!-- CALCULADORA ORB -->

<section class="section container">

<h2 class="section-title">Calculadora Orb</h2>

<div class="calculator">

<div class="calc-grid">

<!-- INPUTS -->

<div class="calc-inputs">

<div class="input-box">
<label>Investimento mensal</label>
<input id="investment" type="number" placeholder="5000" min="500" max="1000000">
</div>

<div class="input-box">
<label>Segmento do negócio</label>

<select id="segment">

<option value="alimentacao">Alimentação</option>
<option value="saude">Saúde</option>
<option value="educacao">Educação</option>
<option value="ecommerce">E-commerce</option>
<option value="geral">Geral</option>

</select>

</div>

<button class="primary" onclick="simulate()">Simular crescimento</button>

</div>

<!-- RESULTADOS -->

<div>

<div class="results" id="results"></div>

</div>

</div>

<div class="cta-final" id="ctaFinal" style="display:none">
<button class="primary">Quero aplicar essa estratégia no meu negócio</button>
</div>

</div>

</section>

<script>

/* ---------------- DADOS BASE ---------------- */

const data={

alimentacao:{
imp:45000,
click:650,
follow:130,
leads:100,
cpl:13,
conv:0.225,
roi:410
},

saude:{
imp:31000,
click:475,
follow:85,
leads:25,
cpl:62,
conv:0.275,
roi:300
},

educacao:{
imp:35000,
click:575,
follow:135,
leads:52,
cpl:30,
conv:0.055,
roi:400
},

ecommerce:{
imp:30000,
click:650,
follow:100,
conv:0.02,
roi:350
},

geral:{
imp:39000,
click:600,
follow:115,
leads:40,
cpl:40,
conv:0.10,
roi:350
}

}

/* ---------------- FUNÇÕES ---------------- */

function roundSmart(n){

if(n>10000) return Math.round(n/1000)*1000
if(n>1000) return Math.round(n/10)*10
return Math.round(n)

}

function calcROI(inv,baseROI){

if(inv<=5000) return baseROI

let progress=(inv-5000)/(300000-5000)

let roi=baseROI-(baseROI-200)*progress

return Math.max(200,roi)

}

function animate(el,value){

let start=0
let dur=1200
let startTime=null

function step(t){

if(!startTime) startTime=t
let p=(t-startTime)/dur
if(p>1)p=1

let val=start+(value-start)*p
el.innerText=Math.round(val)

if(p<1)requestAnimationFrame(step)

}

requestAnimationFrame(step)

}

function simulate(){

let inv=parseFloat(document.getElementById("investment").value)

if(!inv)return

let seg=document.getElementById("segment").value

let base=data[seg]

let mult=inv/1000

let roi=calcROI(inv,base.roi)

let faturamento=inv*(roi/100)

let results={

"Impressões":roundSmart(base.imp*mult),
"Cliques":roundSmart(base.click*mult),
"Seguidores":roundSmart(base.follow*mult),
"Conversão":Math.round(base.conv*100)+"%",
"ROI médio":Math.round(roi)+"%",
"Faturamento projetado":"R$ "+roundSmart(faturamento)

}

if(seg!=="ecommerce"){

results["Leads"]=roundSmart(base.leads*mult)
results["CPL médio"]="R$ "+roundSmart(base.cpl)

}

renderResults(results)

}

/* ---------------- RENDER ---------------- */

function renderResults(results){

const container=document.getElementById("results")

container.innerHTML=""

for(let key in results){

let card=document.createElement("div")
card.className="result-card"

card.innerHTML=`

<h4>${key}</h4>

<div class="result-number">0</div>

<div class="bar">
<div class="bar-fill"></div>
</div>

`

container.appendChild(card)

let num=card.querySelector(".result-number")

let val=results[key]

if(typeof val==="number"){
animate(num,val)
}else{
num.innerText=val
}

let bar=card.querySelector(".bar-fill")

setTimeout(()=>{
bar.style.width=Math.random()*90+10+"%"
},200)

}

container.style.display="grid"

document.getElementById("ctaFinal").style.display="block"

}

</script>

</body>
</html>
